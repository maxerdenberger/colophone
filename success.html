<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>colophon — you're in.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f4f1ec; --paper: #edeae3; --ink: #0d0d0b;
    --soft: #888580; --rule: rgba(13,13,11,0.1); --accent: #ff5100;
    --gs: 'Space Grotesk', sans-serif; --gm: 'IBM Plex Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); color: var(--ink); -webkit-font-smoothing: antialiased; text-transform: lowercase; min-height: 100vh; font-family: var(--gm); }
  a { color: inherit; text-decoration: none; }

  main { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
  .card { max-width: 640px; width: 100%; text-align: center; }
  .check { width: 48px; height: 48px; border: 1.5px solid var(--accent); border-radius: 50%; margin: 0 auto 28px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 18px; }
  h1 { font-family: var(--gs); font-weight: 700; font-size: clamp(40px,6vw,64px); line-height: 0.95; letter-spacing: -0.03em; margin-bottom: 20px; }
  .lede { font-family: var(--gm); font-size: 12px; color: var(--soft); margin-bottom: 36px; line-height: 1.75; max-width: 50ch; margin-left: auto; margin-right: auto; }
  .link-box { background: var(--paper); border: 1px solid var(--rule); padding: 16px 20px; display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .link-box input { flex: 1; background: transparent; border: none; font-family: var(--gm); font-size: 12px; color: var(--ink); outline: none; text-transform: none; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .copy-btn { background: var(--ink); color: var(--cream); border: 1px solid var(--ink); padding: 8px 16px; font-size: 10px; letter-spacing: 0.06em; cursor: pointer; flex-shrink: 0; font-family: var(--gm); text-transform: lowercase; transition: background 0.15s; }
  .copy-btn:hover, .copy-btn.copied { background: var(--accent); border-color: var(--accent); }
  .open-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--ink); color: var(--cream); padding: 14px 28px; font-size: 11px; letter-spacing: 0.08em; border: 1px solid var(--ink); margin-top: 10px; transition: background 0.15s; font-family: var(--gm); }
  .open-btn:hover { background: var(--accent); border-color: var(--accent); }
  .small-print { font-family: var(--gm); font-size: 11px; color: var(--soft); margin-top: 28px; line-height: 1.7; max-width: 44ch; margin-left: auto; margin-right: auto; }
  .divider { width: 40px; height: 1px; background: var(--rule); margin: 40px auto; }
  .next { font-family: var(--gm); font-size: 12px; color: var(--soft); }
  .next a { color: var(--accent); }
</style>
</head>
<body>

<main>
  <div class="card">
    <div class="check">✓</div>
    <h1>you're in.</h1>
    <p class="lede">payment received. the bench is open. we sent your link to the email you used at checkout — and it's right here too.</p>

    <div class="link-box">
      <input id="accessLink" readonly value=""/>
      <button class="copy-btn" id="copyBtn" onclick="copyLink()">copy</button>
    </div>

    <a class="open-btn" id="openBtn" href="#">open the bench →</a>

    <p class="small-print">bookmark it. this link is your access. no password, no account. it expires when your pass does.</p>

    <div class="divider"></div>

    <p class="next">questions? <a href="mailto:hello@colophon.xyz">say hello</a>.</p>
  </div>
</main>

<script>
function makeToken(days) {
  return btoa(JSON.stringify({ exp: Date.now() + days * 86400000 }));
}

function getQueryParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

// Determine pass duration from Stripe price ID if available, default to 7 days
const sessionId = getQueryParam('session_id');
const priceId = getQueryParam('price_id') || '';
let days = 7;
if (priceId.includes('day') || priceId.includes('24h')) days = 1;
else if (priceId.includes('month') || priceId.includes('mo')) days = 30;

const token = makeToken(days);
const baseUrl = window.location.origin + window.location.pathname.replace('success.html', 'bench.html');
const fullLink = `${baseUrl}?t=${token}`;

document.getElementById('accessLink').value = fullLink;
document.getElementById('openBtn').href = fullLink;

function copyLink() {
  const input = document.getElementById('accessLink');
  input.select();
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>

</body>
</html>
