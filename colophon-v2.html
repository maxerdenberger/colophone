function parseSheetCSV(text) {
  const lines = text.split('\n').filter((l) => l.trim());
  const parseRow = (row) => {
    const f = [];let cur = '',inQ = false;
    for (const c of row) {
      if (c === '"') {inQ = !inQ;} else
      if (c === ',' && !inQ) {f.push(cur.trim());cur = '';} else
      cur += c;
    }
    f.push(cur.trim());
    return f;
  };
  // Fixed column indices (confirmed from schema):
  // 5=Discipline, 7=Availability, 12=Top Clients, 15=Value Prop
  const DISC_IDX   = 5;
  const AVAIL_IDX  = 7;
  const CLIENT_IDX = 12;
  const NOTE_IDX   = 15;
  const used = new Set();
  return lines.slice(1).map((line, i) => {
    const row = parseRow(line);
    const rawAvail = (row[AVAIL_IDX] || '').toLowerCase();
    const availability = rawAvail.includes('immediate') ? 'available'
                       : rawAvail.includes('waitlist')  ? 'booked'
                       : 'soon';
    const note = (row[NOTE_IDX] || '').toLowerCase().slice(0, 130);
    if (!note) return null;
    const name = PHIL_POOL.find((n) => !used.has(n)) || `creative ${i+1}`;
    used.add(name);
    const clients = (row[CLIENT_IDX] || '').split(',').map((s) => s.trim().toLowerCase()).filter(Boolean).slice(0, 3);
    const rawDisc = (row[DISC_IDX] || '').toLowerCase();
    const disc = rawDisc.includes('copy') ? 'copywriting'
               : rawDisc.includes('brand strategy') ? 'brand strategy'
               : rawDisc.includes('art') ? 'art direction'
               : rawDisc.includes('design') ? 'design leadership'
               : rawDisc.includes('ux') ? 'ux / content design'
               : rawDisc.includes('motion') ? 'motion design'
               : 'creative direction';
    const firstName = (row[1] || '').split(' ')[0].toLowerCase() || name;
    const emailEnc = btoa(row[2] || '');
    const portfolio = (row[3] || '').trim();
    const linkedin  = (row[4] || '').trim();
    const updatedAt = Date.parse(row[0]) || 0;
    return { id: i+1, name, firstName, emailEnc, portfolio, linkedin, updatedAt, discipline: disc, availability, tz: TZS[i % TZS.length], rate: RATES[i % RATES.length], yoe: 5 + i % 16, clients: clients.length ? clients : ['portfolio available'], note };
  }).filter(Boolean);
}

// ── ANALOG CLOCK ──────────────────────────────────────────────────────────────
function AnalogClock({ tz, city, accent }) {
  const [now, setNow] = useState(new Date());
  useEffect(() => {const id = setInterval(() => setNow(new Date()), 1000);return () => clearInterval(id);}, []);
  const local = new Date(now.toLocaleString('en-US', { timeZone: tz }));
  const h = local.getHours() % 12,m = local.getMinutes(),s = local.getSeconds();
  const hA = (h * 30 + m * 0.5) * Math.PI / 180;
  const mA = m * 6 * Math.PI / 180;
  const sA = s * 6 * Math.PI / 180;
  const hh = (d) => [24 + d * Math.sin(hA), 24 - d * Math.cos(hA)];
  const mh = (d) => [24 + d * Math.sin(mA), 24 - d * Math.cos(mA)];
  const sh = (d) => [24 + d * Math.sin(sA), 24 - d * Math.cos(sA)];
  const timeStr = local.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
      <svg width="52" height="52" viewBox="0 0 48 48" style={{ overflow: 'visible' }}>
        <circle cx="24" cy="24" r="22" fill="none" stroke="rgba(244,241,236,0.12)" strokeWidth="1" />
        {Array.from({ length: 12 }).map((_, i) => {
          const a = i * 30 * Math.PI / 180;
          const isMaj = i % 3 === 0;
          return <line key={i} x1={24 + Math.sin(a) * (isMaj ? 18 : 19.5)} y1={24 - Math.cos(a) * (isMaj ? 18 : 19.5)} x2={24 + Math.sin(a) * 21.5} y2={24 - Math.cos(a) * 21.5} stroke={`rgba(244,241,236,${isMaj ? 0.35 : 0.15})`} strokeWidth={isMaj ? 1 : 0.5} />;
        })}
        <line x1="24" y1="24" x2={hh(12)[0]} y2={hh(12)[1]} stroke="rgba(244,241,236,0.9)" strokeWidth="2" strokeLinecap="round" />
        <line x1="24" y1="24" x2={mh(16)[0]} y2={mh(16)[1]} stroke="rgba(244,241,236,0.7)" strokeWidth="1.5" strokeLinecap="round" />
        <line x1={sh(-4)[0]} y1={sh(-4)[1]} x2={sh(18)[0]} y2={sh(18)[1]} stroke={accent} strokeWidth="1" strokeLinecap="round" />
        <circle cx="24" cy="24" r="1.5" fill={accent} />
      </svg>
      <span style={{ fontFamily: GM, fontSize: 9, color: 'rgba(244,241,236,0.38)', letterSpacing: '0.1em' }}>{city}</span>
      <span style={{ fontFamily: GM, fontSize: 11, color: 'rgba(244,241,236,0.7)', letterSpacing: '0.04em' }}>{timeStr}</span>
    </div>);

}

// ── BENCH BUILDER (replaces fixed pricing) ─────────────────────────────────
function PricingPage({ setPage, accent }) {
  const STRIPE = {
    day: 'https://buy.stripe.com/5kQ5klb64beagze9n8a3u00',
    week: 'https://buy.stripe.com/8x2fYZ1vuaa6fvaeHsa3u01',
    month: 'https://buy.stripe.com/14A145fmk3LIbeU56Sa3u02'
  };

  const [bench, setBench] = useState(BENCH);
  useEffect(() => {
    fetch(SHEETS_CSV).then(r => r.text())
      .then(t => { const p = parseSheetCSV(t); if (p.length > 5) setBench(p); })
      .catch(() => {});
  }, []);

  const [step, setStep] = useState(0);
  const [filters, setFilters] = useState({
    disciplines: [],   // [] = all
    avail: [],         // [] = all  ('available'|'soon'|'booked')
    experience: [],    // [] = all
    timezone: [],      // [] = all  ('americas'|'europe'|'asia')
    rate: [],          // [] = all
  });
  const [duration, setDuration] = useState(null); // 'day' | 'week' | 'month'

  const STEPS = [
    { key: 'disciplines', label: 'discipline',  question: 'what do you actually need?',
      sub: 'pick all that apply. or skip to see the whole bench.',
      options: ['art direction','copywriting','design leadership','creative direction','brand strategy','motion design','ux / content design'] },
    { key: 'avail', label: 'availability', question: 'when do you need them?',
      sub: 'we keep this fresh — every name pings every 20 days.',
      options: [['available','available now'],['soon','available in 1\u20132 weeks'],['booked','anytime in the next quarter']] },
    { key: 'experience', label: 'experience', question: 'what level of experience?',
      sub: 'years are self-reported and verified by referrals.',
      options: [['junior','junior — 0\u20133 yrs'],['mid','mid — 4\u20137 yrs'],['senior','senior — 8\u201314 yrs'],['lead','lead — 15+ yrs']] },
    { key: 'rate', label: 'rate', question: 'what does your budget look like?',
      sub: 'we show real rate bands. you talk money directly with them.',
      options: [['$','$ — under $100/hr'],['$$','$$ — $100\u2013200/hr'],['$$$','$$$ — $200\u2013350/hr'],['$$$$','$$$$ — $350+/hr']] },
  ];

  // Map a person to filter buckets
  const personMatches = (p) => {
    if (filters.disciplines.length && !filters.disciplines.includes(p.discipline)) return false;
    if (filters.avail.length && !filters.avail.includes(p.availability)) return false;
    if (filters.experience.length) {
      const lvl = p.yoe < 4 ? 'junior' : p.yoe < 8 ? 'mid' : p.yoe < 15 ? 'senior' : 'lead';
      if (!filters.experience.includes(lvl)) return false;
    }
    if (filters.timezone.length) {
      const region = p.tz?.startsWith('utc-') ? 'americas' : p.tz === 'utc+0' || p.tz === 'utc+1' || p.tz === 'utc+2' ? 'europe' : 'asia';
      if (!filters.timezone.includes(region)) return false;
    }
    if (filters.rate.length && !filters.rate.includes(p.rate)) return false;
    return true;
  };

  const matched = bench.filter(personMatches);
  const matchedAvail = matched.filter(p => p.availability !== 'booked').length;

  // Pricing: base × discount per filter applied. Floor $29.
  const BASE = { day: 29, week: 79, month: 249 };
  const filtersApplied = Object.values(filters).filter(arr => arr.length > 0).length;
  const discount = Math.min(0.4, filtersApplied * 0.10);
  const priceFor = (d) => Math.max(29, Math.round(BASE[d] * (1 - discount)));

  const toggle = (key, val) => setFilters(f => ({
    ...f,
    [key]: f[key].includes(val) ? f[key].filter(v => v !== val) : [...f[key], val]
  }));

  const TZS_OPT = [['americas','americas (utc-3 to utc-8)'],['europe','europe / africa (utc+0 to utc+2)'],['asia','asia / pacific (utc+5 to utc+12)']];

  // ──────────────────────────────────────────────────
  // INTRO + STEPS + REVEAL — single column, big type
  // ──────────────────────────────────────────────────
  const totalSteps = STEPS.length + 1; // + tz baked into step 2 visually... actually keep tz as part of step 2
  const isReveal = step >= STEPS.length;

  const stepHeader = (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: 56, fontFamily: GM, fontSize: 10, letterSpacing:'0.14em', color: C.soft }}>
      <span>build your bench</span>
      <span>{isReveal ? 'your bench' : `0${step+1} / 0${STEPS.length+1}`}</span>
    </div>
  );

  if (isReveal) {
    // RESULT + DURATION + CONCIERGE UPSELL
    const showConcierge = matched.length < 15;
    return (
      <div style={{ background: C.cream, color: C.ink, minHeight: '100vh' }}>
        <div style={{ maxWidth: 880, margin: '0 auto', padding: '60px 40px 80px' }}>
          {stepHeader}

          {/* Result headline */}
          <p style={{ fontFamily: GM, fontSize: 11, letterSpacing:'0.14em', color: C.soft, marginBottom: 16 }}>your custom bench</p>
          <h1 style={{ fontFamily: GS, fontWeight: 700, fontSize: 'clamp(56px,9vw,108px)', letterSpacing:'-0.04em', lineHeight: 0.92, marginBottom: 28 }}>
            <span style={{ color: accent }}>{matched.length}</span> {filters.disciplines.length === 1 ? filters.disciplines[0].split(' ')[0] + 's' : 'creatives'}.<br/>
            <span style={{ fontWeight:300, opacity: 0.6 }}>{matchedAvail}</span> <span style={{ fontWeight:300, opacity: 0.45 }}>available now.</span>
          </h1>

          {/* Filter recap */}
          <div style={{ display:'flex', flexWrap:'wrap', gap: 8, marginBottom: 40 }}>
            {Object.entries(filters).flatMap(([k, arr]) =>
              arr.map(v => (
                <span key={`${k}-${v}`} style={{ fontFamily: GM, fontSize: 10, letterSpacing:'0.06em', padding:'5px 11px', border:`1px solid ${C.rule}`, background: C.paper, color: C.ink }}>{v}</span>
              ))
            )}
            {filtersApplied > 0 && (
              <button onClick={() => { setFilters({ disciplines: [], avail: [], experience: [], timezone: [], rate: [] }); setStep(0); }}
                style={{ fontFamily: GM, fontSize: 10, letterSpacing:'0.06em', padding:'5px 11px', background: 'transparent', border:'none', color: C.soft, cursor:'pointer', textDecoration:'underline', textUnderlineOffset:3 }}>reset</button>
            )}
            {filtersApplied === 0 && (
              <span style={{ fontFamily: GM, fontSize: 10, color: C.soft }}>no filters applied — full bench, full price.</span>
            )}
          </div>

          {/* Discount line */}
          {discount > 0 && (
            <div style={{ marginBottom: 40, padding:'14px 18px', background: C.ink, color: C.cream, display:'inline-block' }}>
              <span style={{ fontFamily: GM, fontSize: 11, letterSpacing:'0.06em' }}>
                {filtersApplied} filter{filtersApplied > 1 ? 's' : ''} applied — <span style={{ color: accent }}>{Math.round(discount*100)}% off</span> all passes.
              </span>
            </div>
          )}

          {/* Duration tiers */}
          <h2 style={{ fontFamily: GS, fontWeight: 600, fontSize: 22, letterSpacing:'-0.015em', marginBottom: 20 }}>how long do you need access?</h2>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap: 1, background: C.rule, marginBottom: 48 }}>
            {[['day','24 hours','for one urgent brief'],['week','7 days','most common'],['month','30 days','for ongoing search']].map(([k, lbl, sub]) => (
              <div key={k} style={{ background: duration === k ? C.ink : C.cream, color: duration === k ? C.cream : C.ink, padding: '32px 28px', display:'flex', flexDirection:'column', cursor:'pointer' }}
                onClick={() => setDuration(k)}>
                <div style={{ fontFamily: GM, fontSize: 10, letterSpacing:'0.08em', opacity: 0.55, marginBottom: 8 }}>{lbl}</div>
                <div style={{ display:'flex', alignItems:'baseline', gap: 10, marginBottom: 8 }}>
                  <span style={{ fontFamily: GS, fontWeight: 300, fontSize: 56, letterSpacing:'-0.03em', lineHeight: 1 }}>${priceFor(k)}</span>
                  {discount > 0 && <span style={{ fontFamily: GM, fontSize: 12, opacity: 0.4, textDecoration:'line-through' }}>${BASE[k]}</span>}
                </div>
                <div style={{ fontFamily: GM, fontSize: 11, opacity: 0.5, marginBottom: 24 }}>{sub}</div>
                {k === 'week' && <span style={{ fontFamily: GM, fontSize: 9, letterSpacing:'0.1em', color: accent, marginTop:'auto' }}>most popular</span>}
              </div>
            ))}
          </div>

          {/* Checkout CTA */}
          <button onClick={async () => {
              if (!duration) return;
              try {
                const r = await fetch('/api/checkout', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    amount: priceFor(duration),
                    duration,
                    filters,
                    matched: matched.length,
                  }),
                });
                const j = await r.json();
                if (j.url) { window.location.href = j.url; }
                else { alert('checkout error: ' + (j.error || 'unknown')); }
              } catch (err) {
                // fallback to static link if api isn't deployed yet
                window.location.href = STRIPE[duration];
              }
            }}
            disabled={!duration}
            style={{ display:'block', width:'100%', padding:'20px 28px', background: duration ? C.ink : C.rule, color: duration ? C.cream : C.soft, fontFamily: GM, fontSize: 12, letterSpacing:'0.08em', textAlign:'center', textDecoration:'none', cursor: duration ? 'pointer' : 'not-allowed', marginBottom: 40, border:'none' }}>
            {duration ? `unlock ${matched.length} creatives — $${priceFor(duration)} →` : 'pick a duration above to continue'}
          </button>

          {/* Concierge upsell — only if bench is small */}
          {showConcierge && (
            <div style={{ padding: '32px 36px', background: C.paper, border: `1px solid ${C.rule}`, position:'relative' }}>
              <span style={{ position:'absolute', top:-10, left:24, background: C.cream, padding:'0 12px', fontFamily: GM, fontSize: 9, letterSpacing:'0.14em', color: C.soft }}>or</span>
              <h3 style={{ fontFamily: GS, fontWeight: 600, fontSize: 22, letterSpacing:'-0.015em', marginBottom: 8 }}>only {matched.length}? don't want to hire?</h3>
              <p style={{ fontFamily: GM, fontSize: 12, color: C.soft, lineHeight: 1.7, marginBottom: 18, maxWidth:'56ch' }}>
                that's a small bench. skip the search — we'll match you with the right person, run the intro, and get you to a kickoff call within 72 hours.
              </p>
              <div style={{ display:'flex', alignItems:'baseline', gap: 10, marginBottom: 18 }}>
                <span style={{ fontFamily: GS, fontWeight: 300, fontSize: 40, letterSpacing:'-0.025em' }}>$750</span>
                <span style={{ fontFamily: GM, fontSize: 11, color: C.soft }}>flat fee. credited toward your first invoice.</span>
              </div>
              <a href="mailto:concierge@colophon.co?subject=concierge%20match%20request"
                style={{ display:'inline-block', padding:'12px 20px', border:`1px solid ${C.ink}`, color: C.ink, fontFamily: GM, fontSize: 11, letterSpacing:'0.07em', textDecoration:'none' }}>
                start a concierge match →
              </a>
            </div>
          )}

          <button onClick={() => setStep(STEPS.length - 1)} style={{ marginTop: 32, fontFamily: GM, fontSize: 11, color: C.soft, background:'transparent', border:'none', cursor:'pointer', textDecoration:'underline', textUnderlineOffset: 3 }}>
            ← edit filters
          </button>
        </div>
      </div>
    );
  }

  // ──────────────────────────────────────────────────
  // STEP VIEW — one question at a time
  // ──────────────────────────────────────────────────
  const cur = STEPS[step];
  const curSelected = filters[cur.key];

  // For the timezone "step", we fold it into step 1 (avail) — actually let's just expose tz inline on the avail step, since it's quick.
  // For simplicity in this build, keep tz hidden; user can refine later. (Or expand into 5 steps later.)

  return (
    <div style={{ background: C.cream, color: C.ink, minHeight: '100vh' }}>
      <div style={{ maxWidth: 720, margin: '0 auto', padding: '60px 40px 80px' }}>
        {stepHeader}

        {/* Progress bar */}
        <div style={{ display:'flex', gap: 6, marginBottom: 64 }}>
          {STEPS.map((_, i) => (
            <div key={i} style={{ flex: 1, height: 2, background: i <= step ? C.ink : C.rule, transition:'background 0.2s' }} />
          ))}
        </div>

        <p style={{ fontFamily: GM, fontSize: 10, letterSpacing:'0.14em', color: C.soft, marginBottom: 14 }}>{cur.label}</p>
        <h1 style={{ fontFamily: GS, fontWeight: 700, fontSize: 'clamp(40px,6vw,68px)', letterSpacing:'-0.035em', lineHeight: 1, marginBottom: 14 }}>{cur.question}</h1>
        <p style={{ fontFamily: GS, fontStyle:'italic', fontSize: 17, color: C.soft, lineHeight: 1.5, marginBottom: 40, maxWidth:'48ch' }}>{cur.sub}</p>

        {/* Options */}
        <div style={{ display:'flex', flexDirection:'column', gap: 0, marginBottom: 48 }}>
          {cur.options.map((opt) => {
            const [val, label] = Array.isArray(opt) ? opt : [opt, opt];
            const on = curSelected.includes(val);
            return (
              <button key={val} onClick={() => toggle(cur.key, val)}
                style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'22px 4px', borderBottom:`1px solid ${C.rule}`, background:'transparent', cursor:'pointer', fontFamily: GS, fontSize: 22, fontWeight: on ? 600 : 400, color: on ? C.ink : C.soft, textAlign:'left', letterSpacing:'-0.01em' }}>
                <span>{label}</span>
                <span style={{ width: 16, height: 16, border: `1.5px solid ${on ? C.ink : C.rule}`, background: on ? C.ink : 'transparent', display:'flex', alignItems:'center', justifyContent:'center', color: C.cream, fontSize: 11, flexShrink: 0 }}>{on ? '✓' : ''}</span>
              </button>
            );
          })}
        </div>

        {/* Footer: live count + continue */}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap: 24, flexWrap:'wrap' }}>
          <div style={{ fontFamily: GM, fontSize: 11, color: C.soft }}>
            <span style={{ fontFamily: GS, fontSize: 32, color: C.ink, fontWeight: 300, letterSpacing:'-0.02em' }}>{matched.length}</span>
            <span style={{ marginLeft: 10 }}>match so far · {matchedAvail} available now</span>
          </div>
          <div style={{ display:'flex', gap: 12 }}>
            {step > 0 && (
              <button onClick={() => setStep(step - 1)} style={{ fontFamily: GM, fontSize: 11, letterSpacing:'0.06em', padding:'14px 20px', background:'transparent', border:`1px solid ${C.rule}`, color: C.soft, cursor:'pointer' }}>← back</button>
            )}
            <button onClick={() => setStep(step + 1)}
              style={{ fontFamily: GM, fontSize: 11, letterSpacing:'0.07em', padding:'14px 24px', background: C.ink, color: C.cream, border: `1px solid ${C.ink}`, cursor:'pointer' }}>
              {curSelected.length === 0 ? 'skip →' : `continue · ${curSelected.length} picked →`}
            </button>
          </div>
        </div>

        <button onClick={() => setStep(STEPS.length)} style={{ marginTop: 40, fontFamily: GM, fontSize: 10, color: C.soft, background:'transparent', border:'none', cursor:'pointer', textDecoration:'underline', textUnderlineOffset: 3 }}>
          skip the questions, show me the full bench →
        </button>
      </div>
    </div>
  );
}


// ── UNLOCKED BENCH TABLE ──────────────────────────────────────────────────────
function UnlockedBenchTable({ accent }) {
  const [liveBench, setLiveBench] = useState(BENCH);
  const [sel, setSel] = useState(null);
  const [filter, setFilter] = useState('all');
  const [hovered, setHovered] = useState(null);
  const [cursor, setCursor] = useState({ x: 0, y: 0, quip: '' });

  const QUIPS = [
    'a beast in the slack',
    'writer / model / menace',
    'first ones to draft',
    'never misses a deadline',
    'the one you call at 11pm',
    'reads the brief twice',
    'bends scope without breaking it',
    'has actually shipped this',
    'won an effie before lunch',
    'speaks fluent ceo + intern',
    'turns notes into actual ideas',
    'studio quiet, mic loud',
    'has the mood board already',
    'will fight for the headline',
    'sends the rough cut on a saturday',
    'will not let the type get bad',
    'half philosopher, half art director',
    'doesn\u2019t need a creative brief',
    'the agency would charge 4x for this',
    'sends one revision, gets it right',
  ];
  const quipFor = (id) => QUIPS[(id * 7) % QUIPS.length];

  useEffect(() => {
    fetch(SHEETS_CSV)
      .then(r => r.text())
      .then(text => { const p = parseSheetCSV(text); if (p.length > 5) setLiveBench(p); })
      .catch(() => {});
  }, []);

  const discs = ['all', ...Array.from(new Set(liveBench.map(p => p.discipline)))];
  const filtered = filter === 'all' ? liveBench : liveBench.filter(p => p.discipline === filter);
  // freshness reward: most-recently-updated first within each availability tier
  const AVAIL_RANK = { available: 0, soon: 1, booked: 2 };
  const visible = [...filtered].sort((a, b) => {
    const r = AVAIL_RANK[a.availability] - AVAIL_RANK[b.availability];
    if (r !== 0) return r;
    return (b.updatedAt || 0) - (a.updatedAt || 0);
  });
  const avail = visible.filter(p => p.availability !== 'booked');
  const COLS = '36px 1.5fr 1.3fr 56px 70px 80px 80px 80px 28px';

  return (
    <div className="protected" onCopy={e => e.preventDefault()}
         onMouseMove={(e) => setCursor((c) => ({ ...c, x: e.clientX, y: e.clientY }))}>
      {hovered != null && cursor.quip && (
        <div style={{
          position:'fixed', left: cursor.x + 18, top: cursor.y + 18,
          fontFamily:GM, fontSize:10, letterSpacing:'0.06em',
          background:'#0d0d0b', color:'#f4f1ec',
          padding:'6px 10px', pointerEvents:'none', zIndex:1000,
          whiteSpace:'nowrap', maxWidth:260, transform:'rotate(-1.5deg)',
          boxShadow:'0 8px 24px rgba(0,0,0,0.18)',
        }}>{cursor.quip}</div>
      )}
      <div style={{ display:'flex', gap:8, padding:'0 40px 20px', flexWrap:'wrap', alignItems:'center' }}>
        {discs.map(d => (
          <button key={d} onClick={() => setFilter(d)} style={{ fontFamily:GM, fontSize:10, letterSpacing:'0.07em', padding:'5px 12px', cursor:'pointer', border:`1px solid ${C.rule}`, background: filter===d ? C.ink : 'transparent', color: filter===d ? C.cream : C.soft, transition:'all 0.1s' }}>{d}</button>
        ))}
        <span style={{ fontFamily:GM, fontSize:10, color:C.soft, marginLeft:'auto' }}>sorted by freshest · {avail.length} available or soon</span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:COLS, padding:'8px 40px', borderBottom:`1px solid ${C.rule}`, background:C.paper }}>
        {['#','name','discipline','avl','tz','rate','clients','links','contact'].map(h => (  <span key={h} style={{ fontFamily:GM, fontSize:10, color:C.soft, letterSpacing:'0.12em', opacity:0.7 }}>{h}</span>
        ))}
      </div>
      {visible.map((p, i) => {
        const isSel = sel === p.id;
        return (
          <div key={p.id}>
            <div
              onClick={() => setSel(isSel ? null : p.id)}
              onMouseEnter={() => { setHovered(p.id); setCursor((c) => ({ ...c, quip: quipFor(p.id) })); }}
              onMouseLeave={() => { setHovered((h) => h === p.id ? null : h); setCursor((c) => ({ ...c, quip: '' })); }}
              style={{
                display:'grid', gridTemplateColumns:COLS, padding:'11px 40px',
                borderBottom:`1px solid ${C.rule}`,
                background: isSel ? C.ink : (hovered === p.id ? C.paper : C.cream),
                color: isSel ? C.cream : C.ink,
                cursor: hovered === p.id ? 'none' : 'pointer',
                alignItems:'center',
                transition:'background 0.07s',
                borderLeft: isSel ? `3px solid ${accent}` : (hovered === p.id ? `3px solid ${accent}` : '3px solid transparent'),
              }}>
              <span style={{ fontFamily:GM, fontSize:10, opacity:0.3 }}>{String(i+1).padStart(3,'0')}</span>
              <span style={{ fontWeight: isSel ? 600 : 400 }}>{p.firstName || p.name}</span>
              <span style={{ fontFamily:GM, fontSize:10, opacity:0.55 }}>{p.discipline}</span>
              <span style={{ display:'flex', alignItems:'center', gap:4 }}>
                <span style={{ width:7, height:7, borderRadius:'50%', background:AVAIL_DOT[p.availability], display:'inline-block', flexShrink:0 }} />
                <span style={{ fontFamily:GM, fontSize:10, opacity:0.45 }}>{AVAIL_LBL[p.availability]}</span>
              </span>
              <span style={{ fontFamily:GM, fontSize:10, opacity:0.45 }}>{p.tz}</span>
              <span style={{ fontFamily:GM, fontSize:10, opacity:0.65 }}>{p.rate}</span>
              <span style={{ fontFamily:GM, fontSize:10, opacity:0.45, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{p.clients[0]}</span>
              <span style={{ display:'flex', gap:8, alignItems:'center' }}>
                {p.portfolio && (
                  <a href={p.portfolio.startsWith('http') ? p.portfolio : `https://${p.portfolio}`} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} title="portfolio"
                    style={{ fontFamily:GM, fontSize:10, opacity:0.55, color:'inherit', textDecoration:'underline', textUnderlineOffset:2 }}>site</a>
                )}
                {p.linkedin && (
                  <a href={p.linkedin.startsWith('http') ? p.linkedin : `https://${p.linkedin}`} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} title="linkedin"
                    style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', width:14, height:14, background:isSel ? C.cream : C.ink, color:isSel ? C.ink : C.cream, fontFamily:GM, fontSize:8, fontWeight:700, textDecoration:'none' }}>in</a>
                )}
              </span>
              <span style={{ fontFamily:GM, fontSize:11, opacity:0.28, textAlign:'right' }}>{isSel ? '↑' : '↓'}</span>
            </div>
            {isSel && (
              <div style={{ padding:'18px 40px 22px', background:'#111110', borderBottom:`1px solid rgba(255,255,255,0.05)` }}>
                <p style={{ fontFamily:GS, fontSize:13, fontStyle:'italic', color:'rgba(244,241,236,0.68)', lineHeight:1.55, marginBottom:14, textTransform:'none', maxWidth:'72ch' }}>"{p.note}"</p>
                <div style={{ display:'flex', gap:12, flexWrap:'wrap', alignItems:'center' }}>
                  {p.clients.map(c => <span key={c} style={{ border:'1px solid rgba(255,255,255,0.12)', padding:'2px 9px', fontFamily:GM, fontSize:10, color:'rgba(244,241,236,0.4)' }}>{c}</span>)}
                  <span style={{ fontFamily:GM, fontSize:10, color:'rgba(244,241,236,0.3)', marginLeft:'auto' }}>{p.yoe} yrs exp · {p.tz}</span>
                  {p.emailEnc && (
                    <button onClick={(e) => { e.stopPropagation(); window.location.href = `mailto:${atob(p.emailEnc)}`; }} style={{ fontFamily:GM, fontSize:10, letterSpacing:'0.08em', background:'transparent', border:`1px solid ${accent}`, color:accent, padding:'7px 14px', cursor:'pointer', flexShrink:0 }}>
                      contact →
                    </button>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── ACCESS PAGE ───────────────────────────────────────────────────────────────
function AccessPage({ accent }) {
  const [unlocked, setUnlocked] = useState(false);
  const [expired, setExpired]   = useState(false);
  const [tier, setTier]         = useState(null);
  const [code, setCode]         = useState('');
  const [err, setErr]           = useState(false);
  const [timeLeft, setTimeLeft] = useState('');

  useEffect(() => {
    const t = new URLSearchParams(window.location.search).get('t');
    if (!t) return;
    const s = checkToken(t);
    if (s === 'valid') {
      setUnlocked(true);
      const { exp, tier: tokenTier } = JSON.parse(atob(t));
      if (tokenTier) setTier(tokenTier);
      const tick = () => {
        const left = exp - Date.now();
        if (left <= 0) { setExpired(true); setUnlocked(false); return; }
        const d = Math.floor(left/86400000), h = Math.floor(left%86400000/3600000), m = Math.floor(left%3600000/60000);
        setTimeLeft(d > 0 ? `${d}d ${h}h remaining` : h > 0 ? `${h}h ${m}m remaining` : `${m}m remaining`);
      };
      tick();
      const id = setInterval(tick, 30000);
      return () => clearInterval(id);
    }
    if (s === 'expired') setExpired(true);
  }, []);

  const simulate = (t, days) => {
    const token = btoa(JSON.stringify({ exp: Date.now() + days * 86400000, tier: t }));
    setTier(t);
    setUnlocked(true);
    const d = Math.floor(days);
    setTimeLeft(d > 0 ? `${d}d remaining` : '24h remaining');
    window.history.replaceState({}, '', `?t=${token}`);
  };

  const tryUnlock = () => { if (code.trim().length > 0) setUnlocked(true); else setErr(true); };

  if (expired) return (
    <div style={{ background: C.cream, minHeight: 'calc(100vh - 54px)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 18, padding: 40, textAlign: 'center' }}>
      <div style={{ width: 48, height: 48, border: '1.5px solid #b04040', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#b04040', fontSize: 20 }}>×</div>
      <h2 style={{ fontFamily: GS, fontWeight: 700, fontSize: 'clamp(32px,5vw,56px)', letterSpacing: '-0.03em' }}>pass expired.</h2>
      <p style={{ fontFamily: GM, fontSize: 12, color: C.soft, maxWidth: '40ch', lineHeight: 1.75 }}>your access window has closed. purchase a new pass for a fresh link.</p>
    </div>);


  if (!unlocked) return (
    <div style={{ background: C.cream, color: C.ink, minHeight: 'calc(100vh - 54px)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 20, padding: 40, textAlign: 'center' }}>
      <p style={{ fontFamily: GM, fontSize: 10, letterSpacing: '0.16em', color: C.soft }}>client access</p>
      <h2 style={{ fontFamily: GS, fontWeight: 700, fontSize: 'clamp(36px,6vw,72px)', letterSpacing: '-0.035em', lineHeight: 0.93 }}>enter your pass code.</h2>
      <p style={{ fontFamily: GM, fontSize: 11, color: C.soft, maxWidth: '44ch', lineHeight: 1.75 }}>
        you received a link after purchase. paste your code below — or type anything to preview.
      </p>
      <div style={{ display: 'flex', width: '100%', maxWidth: 440, border: `1px solid ${C.rule}` }}>
        <input value={code} onChange={(e) => setCode(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && tryUnlock()} placeholder="colophon-xxxx" style={{ flex: 1, background: 'transparent', border: 'none', borderRight: `1px solid ${C.rule}`, padding: '13px 16px', fontFamily: GM, fontSize: 13, color: C.ink, outline: 'none', textTransform: 'none' }} />
        <button onClick={tryUnlock} style={{ fontFamily: GM, fontSize: 10, letterSpacing: '0.08em', background: C.ink, color: C.cream, border: 'none', padding: '13px 20px', cursor: 'pointer' }}>unlock →</button>
      </div>
      {err && <p style={{ fontFamily: GM, fontSize: 10, color: '#b04040' }}>type anything to preview.</p>}

      {/* simulate post-payment flow */}
      <div style={{ marginTop: 32, padding: '24px 28px', border: `1px solid ${C.rule}`, background: C.paper, maxWidth: 480, textAlign: 'left' }}>
        <p style={{ fontFamily: GM, fontSize: 9, color: C.soft, letterSpacing: '0.14em', marginBottom:16 }}>simulate post-payment — step through what a buyer sees</p>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {[
            { label:'day pass ($29)',   tier:'day',   days:1  },
            { label:'week pass ($49)',  tier:'week',  days:7  },
            { label:'monthly ($149)',   tier:'month', days:30 },
          ].map(({ label, tier: t, days }) => (
            <button key={t} onClick={() => simulate(t, days)} style={{ fontFamily:GM, fontSize:11, letterSpacing:'0.06em', background: C.ink, color: C.cream, border:'none', padding:'12px 18px', cursor:'pointer', textAlign:'left', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span>{label}</span>
              <span style={{ opacity:0.45, fontSize:10 }}>simulate purchase →</span>
            </button>
          ))}
        </div>
        <p style={{ fontFamily:GM, fontSize:10, color:C.soft, marginTop:14, lineHeight:1.65 }}>
          in production: stripe webhook generates a signed url → emails it to buyer → they click → lands here with token in the url → auto-unlocks → expires when pass does.
        </p>
      </div>
    </div>);


  return (
    <div style={{ background: C.cream, color: C.ink, minHeight: 'calc(100vh - 54px)' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto', paddingTop: 40, paddingBottom: 64 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', padding: '0 40px 20px', borderBottom: `1px solid ${C.rule}` }}>
          <div>
            <h2 style={{ fontFamily: GS, fontWeight: 700, fontSize: 'clamp(28px,4vw,48px)', letterSpacing: '-0.025em', lineHeight: 1 }}>the bench. all of it.</h2>
            <p style={{ fontFamily: GM, fontSize: 11, color: C.soft, marginTop: 6 }}>real names, real rates, direct contact. reach out yourself.</p>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontFamily: GM, fontSize: 10, color: AVAIL_DOT.available }}>● hi again. the bench is open.</div>
            {tier && <div style={{ fontFamily: GM, fontSize: 10, color: C.soft, marginTop: 2 }}>{tier} pass</div>}
            {timeLeft && <div style={{ fontFamily: GM, fontSize: 10, color: C.soft, marginTop: 2 }}>{timeLeft}</div>}
          </div>
        </div>
        <div style={{ paddingTop: 24 }}><UnlockedBenchTable accent={accent} /></div>
      </div>
    </div>);

}

// ── HEADER ────────────────────────────────────────────────────────────────────
function Header({ page, setPage, accent }) {
  return (
    <header style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0 40px', height: 54, borderBottom: `1px solid ${C.rule}`, background: C.cream, fontFamily: GM, fontSize: 12, position: 'sticky', top: 0, zIndex: 100 }}>
      <button onClick={() => setPage('home')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontFamily: GS, fontSize: 15, fontWeight: 700, color: C.ink, letterSpacing: '-0.02em' }}>
        colo<span style={{ color: accent }}>phon</span>
      </button>
      <nav style={{ display: 'flex', gap: 28 }}>
        {[['pricing', 'get a pass'], ['apply', 'join the bench'], ['access', 'access']].map(([key, label]) =>
        <button key={key} onClick={() => setPage(key)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontFamily: GM, fontSize: 11, letterSpacing: '0.05em', color: page === key ? C.ink : C.soft, borderBottom: page === key ? `1px solid ${C.ink}` : '1px solid transparent', paddingBottom: 1 }}>{label}</button>
        )}
      </nav>
    </header>);

}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = useState('home');
  const { variant, accent } = tweaks;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <Header page={page} setPage={setPage} accent={accent} />
      {page === 'home' && <HomePage setPage={setPage} accent={accent} variant={variant} />}
      {page === 'apply' && <ApplyPage accent={accent} />}
      {page === 'pricing' && <PricingPage setPage={setPage} accent={accent} />}
      {page === 'access' && <AccessPage accent={accent} />}
      <Footer accent={accent} setPage={setPage} />
      <TweaksPanel title="Tweaks">
        <TweakRadio label="variant" value={variant} options={['safe', 'bold']} onChange={(v) => setTweak('variant', v)} />
        <TweakColor label="accent" value={accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
